<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bg)"/>
  <text x="200" y="28" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="16" font-weight="700" fill="#FF6B9D">Meet the Shapes! 🔺🔵🟩</text>

  <!-- Circle -->
  <g transform="translate(50, 50)">
    <circle cx="40" cy="40" r="35" fill="#4ECDC4" opacity="0.3" stroke="#4ECDC4" stroke-width="3"/>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Circle</text>
    <text x="40" y="95" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">0 sides</text>
    <text x="40" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">Round like ☀️</text>
  </g>

  <!-- Square -->
  <g transform="translate(150, 50)">
    <rect x="5" y="5" width="70" height="70" rx="4" fill="#FFD93D" opacity="0.3" stroke="#FFD93D" stroke-width="3"/>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Square</text>
    <text x="40" y="95" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">4 equal sides</text>
    <text x="40" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">Like a 🖼️</text>
  </g>

  <!-- Triangle -->
  <g transform="translate(250, 50)">
    <polygon points="40,5 75,75 5,75" fill="#FF6B9D" opacity="0.3" stroke="#FF6B9D" stroke-width="3"/>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Triangle</text>
    <text x="40" y="95" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">3 sides</text>
    <text x="40" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">Like 🍕</text>
  </g>

  <!-- Rectangle -->
  <g transform="translate(350, 50)">
    <rect x="5" y="15" width="70" height="50" rx="4" fill="#FF9800" opacity="0.3" stroke="#FF9800" stroke-width="3"/>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Rectangle</text>
    <text x="40" y="95" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">4 sides</text>
    <text x="40" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" fill="#777">Like a 🚪</text>
  </g>
</svg>
