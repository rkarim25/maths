<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bg)"/>
  <text x="200" y="28" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="16" font-weight="700" fill="#FF6B9D">Count the Carrots! 🥕</text>

  <!-- 4 groups of 10 carrots = 40 -->
  <!-- Group 1 -->
  <g transform="translate(20, 45)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="12" font-weight="700" fill="#FF9800">🥕🥕🥕🥕🥕</text>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" font-weight="700" fill="#777">10</text>
  </g>

  <!-- Group 2 -->
  <g transform="translate(110, 45)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="12" font-weight="700" fill="#FF9800">🥕🥕🥕🥕🥕</text>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" font-weight="700" fill="#777">10</text>
  </g>

  <!-- Group 3 -->
  <g transform="translate(200, 45)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="12" font-weight="700" fill="#FF9800">🥕🥕🥕🥕🥕</text>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" font-weight="700" fill="#777">10</text>
  </g>

  <!-- Group 4 -->
  <g transform="translate(290, 45)">
    <rect x="0" y="0" width="80" height="30" rx="4" fill="none" stroke="#FF9800" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="40" y="20" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="12" font-weight="700" fill="#FF9800">🥕🥕🥕🥕🥕</text>
    <text x="40" y="45" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="11" font-weight="700" fill="#777">10</text>
  </g>

  <!-- Question -->
  <text x="200" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="16" font-weight="700" fill="#333">4 groups of 10 = ?</text>

  <!-- Answer options -->
  <rect x="60" y="130" width="60" height="24" rx="6" fill="#E8F8F5"/><text x="90" y="147" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">30</text>
  <rect x="130" y="130" width="60" height="24" rx="6" fill="#E8F8F5"/><text x="160" y="147" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">35</text>
  <rect x="200" y="130" width="60" height="24" rx="6" fill="#FFE0EC"/><text x="230" y="147" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#FF6B9D">40</text>
  <rect x="270" y="130" width="60" height="24" rx="6" fill="#E8F8F5"/><text x="300" y="147" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">50</text>

  <text x="200" y="175" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#4ECDC4">10 + 10 + 10 + 10 = 40!</text>
</svg>
