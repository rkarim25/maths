<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="120" rx="16" fill="url(#bg)"/>
  <!-- Number line -->
  <line x1="20" y1="70" x2="580" y2="70" stroke="#FF6B9D" stroke-width="3" stroke-linecap="round"/>
  <!-- Tick marks and numbers 1-10 -->
  <line x1="40" y1="60" x2="40" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="40" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">1</text>
  <circle cx="40" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="95" y1="60" x2="95" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="95" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">2</text>
  <circle cx="95" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="150" y1="60" x2="150" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="150" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">3</text>
  <circle cx="150" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="205" y1="60" x2="205" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="205" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">4</text>
  <circle cx="205" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="260" y1="60" x2="260" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="260" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">5</text>
  <circle cx="260" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="315" y1="60" x2="315" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="315" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">6</text>
  <circle cx="315" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="370" y1="60" x2="370" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="370" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">7</text>
  <circle cx="370" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="425" y1="60" x2="425" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="425" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">8</text>
  <circle cx="425" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="480" y1="60" x2="480" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="480" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">9</text>
  <circle cx="480" cy="70" r="6" fill="#4ECDC4"/>

  <line x1="535" y1="60" x2="535" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="535" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">10</text>
  <circle cx="535" cy="70" r="6" fill="#4ECDC4"/>

  <!-- Arrow at end -->
