<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="120" rx="16" fill="url(#bg)"/>
  <!-- Number line -->
  <line x1="30" y1="70" x2="370" y2="70" stroke="#FF6B9D" stroke-width="3" stroke-linecap="round"/>
  <!-- Tick marks and numbers 1-5 -->
  <line x1="50" y1="60" x2="50" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="50" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#333">1</text>
  <circle cx="50" cy="70" r="8" fill="#4ECDC4"/>

  <line x1="110" y1="60" x2="110" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="110" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#333">2</text>
  <circle cx="110" cy="70" r="8" fill="#4ECDC4"/>

  <line x1="170" y1="60" x2="170" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="170" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#333">3</text>
  <circle cx="170" cy="70" r="8" fill="#4ECDC4"/>

  <line x1="230" y1="60" x2="230" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="230" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#333">4</text>
  <circle cx="230" cy="70" r="8" fill="#4ECDC4"/>

  <line x1="290" y1="60" x2="290" y2="80" stroke="#FF6B9D" stroke-width="2"/>
  <text x="290" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#333">5</text>
  <circle cx="290" cy="70" r="8" fill="#4ECDC4"/>

  <!-- Arrow at end -->
  <polygon points="370,70 355,62 355,78" fill="#FF6B9D"/>

  <!-- Title -->
  <text x="200" y="105" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" fill="#777">Number Line 1–5</text>
</svg>
