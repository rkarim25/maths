<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8F0"/>
      <stop offset="100%" style="stop-color:#FFE0D0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" rx="16" fill="url(#bg)"/>
  <text x="200" y="28" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="16" font-weight="700" fill="#FF6B9D">Subtraction with Apples 🍎</text>

  <!-- Start: 8 apples -->
  <text x="100" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Start with:</text>
  <circle cx="40" cy="80" r="14" fill="#F44336"/>
  <circle cx="75" cy="80" r="14" fill="#F44336"/>
  <circle cx="110" cy="80" r="14" fill="#F44336"/>
  <circle cx="145" cy="80" r="14" fill="#F44336"/>
  <circle cx="40" cy="115" r="14" fill="#F44336"/>
  <circle cx="75" cy="115" r="14" fill="#F44336"/>
  <circle cx="110" cy="115" r="14" fill="#F44336"/>
  <circle cx="145" cy="115" r="14" fill="#F44336"/>
  <text x="100" y="150" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#FF6B9D">8 apples</text>

  <!-- Minus sign -->
  <text x="200" y="110" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="28" font-weight="700" fill="#FF9800">−</text>

  <!-- Take away 3 -->
  <text x="300" y="55" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="14" font-weight="700" fill="#333">Take away:</text>
  <circle cx="260" cy="80" r="14" fill="#F44336" opacity="0.4"/>
  <circle cx="295" cy="80" r="14" fill="#F44336" opacity="0.4"/>
  <circle cx="330" cy="80" r="14" fill="#F44336" opacity="0.4"/>
  <text x="300" y="150" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="18" font-weight="700" fill="#FF9800">3 apples</text>

  <!-- Equals -->
  <text x="200" y="175" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="28" font-weight="700" fill="#FFD93D">=</text>

  <!-- Result -->
  <text x="200" y="195" text-anchor="middle" font-family="Fredoka, sans-serif" font-size="20" font-weight="700" fill="#4CAF50">5 apples left!</text>
</svg>
