<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Apple tree -->
  <rect x="140" y="120" width="20" height="60" fill="#8B4513"/>
  <circle cx="150" cy="100" r="40" fill="#228B22"/>
  
  <!-- Apples on the tree (6 apples) -->
  <circle cx="130" cy="80" r="8" fill="#FF0000"/>
  <circle cx="150" cy="70" r="8" fill="#FF0000"/>
  <circle cx="170" cy="80" r="8" fill="#FF0000"/>
  <circle cx="140" cy="95" r="8" fill="#FF0000"/>
  <circle cx="160" cy="95" r="8" fill="#FF0000"/>
  <circle cx="150" cy="110" r="8" fill="#FF0000"/>
  
  <!-- Apple highlights -->
  <circle cx="128" cy="78" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="148" cy="68" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="168" cy="78" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="138" cy="93" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="158" cy="93" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="148" cy="108" r="2" fill="#FFF" opacity="0.7"/>
  
  <!-- Question mark -->
  <text x="220" y="100" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">?</text>
  
  <!-- Equals sign -->
  <text x="220" y="130" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">=</text>
  
  <!-- Original number of apples (10 apples) -->
  <text x="220" y="160" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">10</text>
  
  <!-- Minus sign -->
  <text x="150" y="150" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">−</text>
  
  <!-- Stolen apples (4 apples in a basket with question marks) -->
  <rect x="80" y="160" width="60" height="30" fill="#8B4513" rx="5"/>
  <circle cx="95" cy="175" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="115" cy="175" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="135" cy="175" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="125" cy="155" r="8" fill="#FF0000" opacity="0.5"/>
  
  <!-- Question marks on stolen apples -->
  <text x="95" y="180" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FFF">?</text>
  <text x="115" y="180" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FFF">?</text>
  <text x="135" y="180" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FFF">?</text>
  <text x="125" y="160" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FFF">?</text>
</svg>