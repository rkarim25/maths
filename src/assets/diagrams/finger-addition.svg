<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Hands -->
  <!-- Left hand -->
  <g transform="translate(50, 50)">
    <!-- Palm -->
    <ellipse cx="20" cy="30" rx="15" ry="25" fill="#FFDBAC"/>
    
    <!-- Fingers -->
    <!-- Thumb -->
    <rect x="5" y="5" width="8" height="25" fill="#FFDBAC" rx="4"/>
    <!-- Index finger -->
    <rect x="15" y="0" width="8" height="30" fill="#FFDBAC" rx="4"/>
    <!-- Middle finger -->
    <rect x="25" y="-5" width="8" height="35" fill="#FFDBAC" rx="4"/>
    <!-- Ring finger -->
    <rect x="35" y="-3" width="8" height="33" fill="#FFDBAC" rx="4"/>
    <!-- Pinky -->
    <rect x="45" y="0" width="8" height="28" fill="#FFDBAC" rx="4"/>
    
    <!-- Finger lines -->
    <line x1="15" y1="10" x2="23" y2="10" stroke="#ddd" stroke-width="1"/>
    <line x1="25" y1="5" x2="33" y2="5" stroke="#ddd" stroke-width="1"/>
    <line x1="35" y1="7" x2="43" y2="7" stroke="#ddd" stroke-width="1"/>
    <line x1="45" y1="10" x2="53" y2="10" stroke="#ddd" stroke-width="1"/>
  </g>
  
  <!-- Right hand -->
  <g transform="translate(180, 50)">
    <!-- Palm -->
    <ellipse cx="20" cy="30" rx="15" ry="25" fill="#FFDBAC"/>
    
    <!-- Fingers -->
    <!-- Thumb -->
    <rect x="5" y="5" width="8" height="25" fill="#FFDBAC" rx="4"/>
    <!-- Index finger -->
    <rect x="15" y="0" width="8" height="30" fill="#FFDBAC" rx="4"/>
    <!-- Middle finger -->
    <rect x="25" y="-5" width="8" height="35" fill="#FFDBAC" rx="4"/>
    <!-- Ring finger -->
    <rect x="35" y="-3" width="8" height="33" fill="#FFDBAC" rx="4"/>
    <!-- Pinky -->
    <rect x="45" y="0" width="8" height="28" fill="#FFDBAC" rx="4"/>
    
    <!-- Highlight some fingers (for counting) -->
    <rect x="15" y="0" width="8" height="30" fill="#4CAF50" rx="4" opacity="0.7"/>
    <rect x="25" y="-5" width="8" height="35" fill="#4CAF50" rx="4" opacity="0.7"/>
  </g>
  
  <!-- Labels -->
  <text x="100" y="180" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">4 fingers</text>
  <text x="230" y="180" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">3 fingers</text>
  <text x="150" y="195" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">4 + 3 = 7</text>
</svg>