<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Apple tree -->
  <rect x="140" y="120" width="20" height="60" fill="#8B4513"/>
  <circle cx="150" cy="100" r="40" fill="#228B22"/>
  
  <!-- Apples on the tree (8 apples) -->
  <circle cx="130" cy="80" r="8" fill="#FF0000"/>
  <circle cx="150" cy="70" r="8" fill="#FF0000"/>
  <circle cx="170" cy="80" r="8" fill="#FF0000"/>
  <circle cx="140" cy="95" r="8" fill="#FF0000"/>
  <circle cx="160" cy="95" r="8" fill="#FF0000"/>
  <circle cx="150" cy="110" r="8" fill="#FF0000"/>
  <circle cx="135" cy="115" r="8" fill="#FF0000"/>
  <circle cx="165" cy="115" r="8" fill="#FF0000"/>
  
  <!-- Apple highlights -->
  <circle cx="128" cy="78" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="148" cy="68" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="168" cy="78" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="138" cy="93" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="158" cy="93" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="148" cy="108" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="133" cy="113" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="163" cy="113" r="2" fill="#FFF" opacity="0.7"/>
  
  <!-- Minus sign -->
  <text x="150" y="150" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">−</text>
  
  <!-- Stolen apples (3 apples in a basket) -->
  <rect x="200" y="160" width="60" height="30" fill="#8B4513" rx="5"/>
  <circle cx="215" cy="175" r="8" fill="#FF0000"/>
  <circle cx="235" cy="175" r="8" fill="#FF0000"/>
  <circle cx="255" cy="175" r="8" fill="#FF0000"/>
  
  <!-- Apple highlights on stolen apples -->
  <circle cx="213" cy="173" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="233" cy="173" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="253" cy="173" r="2" fill="#FFF" opacity="0.7"/>
  
  <!-- Equals sign -->
  <text x="150" y="180" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">=</text>
  
  <!-- Remaining apples on tree (5 apples) -->
  <circle cx="130" cy="80" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="150" cy="70" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="170" cy="80" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="140" cy="95" r="8" fill="#FF0000" opacity="0.5"/>
  <circle cx="160" cy="95" r="8" fill="#FF0000" opacity="0.5"/>
</svg>