<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Garden plot -->
  <rect x="50" y="50" width="200" height="100" fill="#90EE90" stroke="#444" stroke-width="2"/>
  
  <!-- Seed (Triangle) -->
  <polygon points="150,80 160,100 140,100" fill="#8B4513"/>
  <text x="150" y="120" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">Seed</text>
  
  <!-- Question -->
  <text x="150" y="30" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">What shape is this seed?</text>
  
  <!-- Options -->
  <circle cx="70" cy="170" r="15" fill="#FF6B6B"/>
  <text x="70" y="175" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#FFF">Circle</text>
  
  <rect x="110" y="155" width="30" height="30" fill="#4ECDC4"/>
  <text x="125" y="195" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Square</text>
  
  <polygon points="185,155 200,185 170,185" fill="#FFD166"/>
  <text x="185" y="195" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Triangle</text>
  
  <rect x="225" y="155" width="40" height="25" fill="#118AB2"/>
  <text x="245" y="195" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Rectangle</text>
</svg>