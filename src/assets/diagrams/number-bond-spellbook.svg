<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Spellbook -->
  <rect x="50" y="20" width="200" height="160" fill="#8B4513" rx="10"/>
  <rect x="55" y="25" width="190" height="150" fill="#FFF" rx="8"/>
  
  <!-- Spellbook lines -->
  <line x1="60" y1="40" x2="240" y2="40" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="60" x2="240" y2="60" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="80" x2="240" y2="80" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="100" x2="240" y2="100" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="120" x2="240" y2="120" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="140" x2="240" y2="140" stroke="#DDD" stroke-width="1"/>
  <line x1="60" y1="160" x2="240" y2="160" stroke="#DDD" stroke-width="1"/>
  
  <!-- Number bond equation -->
  <text x="150" y="90" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">4 + ? = 10</text>
  
  <!-- Sparkles -->
  <circle cx="70" cy="30" r="3" fill="#FFD700"/>
  <circle cx="230" cy="30" r="3" fill="#FFD700"/>
  <circle cx="70" cy="170" r="3" fill="#FFD700"/>
  <circle cx="230" cy="170" r="3" fill="#FFD700"/>
</svg>