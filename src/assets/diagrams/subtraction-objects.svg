<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Initial apples (9 apples) -->
  <circle cx="30" cy="50" r="10" fill="#FF0000"/>
  <circle cx="60" cy="50" r="10" fill="#FF0000"/>
  <circle cx="90" cy="50" r="10" fill="#FF0000"/>
  <circle cx="120" cy="50" r="10" fill="#FF0000"/>
  <circle cx="150" cy="50" r="10" fill="#FF0000"/>
  <circle cx="180" cy="50" r="10" fill="#FF0000"/>
  <circle cx="210" cy="50" r="10" fill="#FF0000"/>
  <circle cx="240" cy="50" r="10" fill="#FF0000"/>
  <circle cx="270" cy="50" r="10" fill="#FF0000"/>
  
  <!-- Apple highlights -->
  <circle cx="28" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="58" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="88" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="118" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="148" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="178" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="208" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="238" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="268" cy="48" r="3" fill="#FFF" opacity="0.7"/>
  
  <!-- Minus sign -->
  <text x="150" y="100" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">−</text>
  
  <!-- Apples being taken away (4 apples with cross marks) -->
  <circle cx="30" cy="150" r="10" fill="#FF0000" opacity="0.5"/>
  <circle cx="60" cy="150" r="10" fill="#FF0000" opacity="0.5"/>
  <circle cx="90" cy="150" r="10" fill="#FF0000" opacity="0.5"/>
  <circle cx="120" cy="150" r="10" fill="#FF0000" opacity="0.5"/>
  
  <!-- Cross marks on taken apples -->
  <line x1="25" y1="145" x2="35" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="35" y1="145" x2="25" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="55" y1="145" x2="65" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="65" y1="145" x2="55" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="85" y1="145" x2="95" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="95" y1="145" x2="85" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="115" y1="145" x2="125" y2="155" stroke="#FFF" stroke-width="2"/>
  <line x1="125" y1="145" x2="115" y2="155" stroke="#FFF" stroke-width="2"/>
  
  <!-- Equals sign -->
  <text x="150" y="170" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">=</text>
  
  <!-- Remaining apples (5 apples) -->
  <circle cx="180" cy="150" r="10" fill="#FF0000"/>
  <circle cx="210" cy="150" r="10" fill="#FF0000"/>
  <circle cx="240" cy="150" r="10" fill="#FF0000"/>
  <circle cx="270" cy="150" r="10" fill="#FF0000"/>
  <circle cx="195" cy="170" r="10" fill="#FF0000"/>
  
  <!-- Apple highlights on remaining apples -->
  <circle cx="178" cy="148" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="208" cy="148" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="238" cy="148" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="268" cy="148" r="3" fill="#FFF" opacity="0.7"/>
  <circle cx="193" cy="168" r="3" fill="#FFF" opacity="0.7"/>
</svg>