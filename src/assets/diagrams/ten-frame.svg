<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Ten frame grid (2 rows of 5) -->
  <rect x="10" y="10" width="180" height="80" fill="none" stroke="#444" stroke-width="2"/>
  <line x1="46" y1="10" x2="46" y2="90" stroke="#444" stroke-width="2"/>
  <line x1="82" y1="10" x2="82" y2="90" stroke="#444" stroke-width="2"/>
  <line x1="118" y1="10" x2="118" y2="90" stroke="#444" stroke-width="2"/>
  <line x1="154" y1="10" x2="154" y2="90" stroke="#444" stroke-width="2"/>
  <line x1="10" y1="50" x2="190" y2="50" stroke="#444" stroke-width="2"/>
  
  <!-- Dots representing items counted -->
  <!-- First row (5 items) -->
  <circle cx="28" cy="30" r="10" fill="#FF6B6B"/>
  <circle cx="64" cy="30" r="10" fill="#4ECDC4"/>
  <circle cx="100" cy="30" r="10" fill="#FF6B6B"/>
  <circle cx="136" cy="30" r="10" fill="#4ECDC4"/>
  <circle cx="172" cy="30" r="10" fill="#FF6B6B"/>
  
  <!-- Second row (5 items) -->
  <circle cx="28" cy="70" r="10" fill="#4ECDC4"/>
  <circle cx="64" cy="70" r="10" fill="#FF6B6B"/>
  <circle cx="100" cy="70" r="10" fill="#4ECDC4"/>
  <circle cx="136" cy="70" r="10" fill="#FF6B6B"/>
  <circle cx="172" cy="70" r="10" fill="#4ECDC4"/>
</svg>