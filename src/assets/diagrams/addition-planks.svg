<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Bridge planks -->
  <!-- First group (3 planks) -->
  <rect x="50" y="80" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="50" y="100" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="50" y="120" width="60" height="10" fill="#8B4513" rx="5"/>
  
  <!-- Second group (2 planks) -->
  <rect x="150" y="80" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="150" y="100" width="60" height="10" fill="#8B4513" rx="5"/>
  
  <!-- Plus sign -->
  <text x="125" y="110" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">+</text>
  
  <!-- Equals sign -->
  <text x="225" y="110" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">=</text>
  
  <!-- Result group (5 planks) -->
  <rect x="240" y="60" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="240" y="80" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="240" y="100" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="240" y="120" width="60" height="10" fill="#8B4513" rx="5"/>
  <rect x="240" y="140" width="60" height="10" fill="#8B4513" rx="5"/>
  
  <!-- Labels -->
  <text x="80" y="70" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">3</text>
  <text x="180" y="70" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">2</text>
  <text x="270" y="50" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#444">5</text>
</svg>