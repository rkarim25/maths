<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Clock (Circle) -->
  <circle cx="50" cy="50" r="25" fill="#FFF" stroke="#444" stroke-width="2"/>
  <circle cx="50" cy="50" r="3" fill="#444"/>
  <line x1="50" y1="50" x2="65" y2="50" stroke="#444" stroke-width="2"/>
  <line x1="50" y1="50" x2="50" y2="35" stroke="#444" stroke-width="2"/>
  <text x="50" y="85" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Clock</text>
  
  <!-- Window (Square) -->
  <rect x="120" y="30" width="40" height="40" fill="#87CEEB" stroke="#444" stroke-width="2"/>
  <line x1="120" y1="50" x2="160" y2="50" stroke="#444" stroke-width="1"/>
  <line x1="140" y1="30" x2="140" y2="70" stroke="#444" stroke-width="1"/>
  <text x="140" y="85" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Window</text>
  
  <!-- Pizza slice (Triangle) -->
  <polygon points="230,30 260,70 200,70" fill="#FFD700" stroke="#444" stroke-width="2"/>
  <circle cx="230" cy="55" r="3" fill="#8B4513"/>
  <text x="230" y="85" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Pizza</text>
  
  <!-- Door (Rectangle) -->
  <rect x="50" y="120" width="30" height="50" fill="#8B4513" stroke="#444" stroke-width="2"/>
  <circle cx="75" cy="145" r="2" fill="#FFD700"/>
  <text x="65" y="185" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Door</text>
  
  <!-- TV (Rectangle) -->
  <rect x="120" y="110" width="60" height="40" fill="#000" stroke="#444" stroke-width="2"/>
  <rect x="125" y="115" width="50" height="25" fill="#1E90FF"/>
  <text x="150" y="165" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">TV</text>
  
  <!-- Book (Rectangle) -->
  <rect x="200" y="120" width="40" height="50" fill="#FFF" stroke="#444" stroke-width="2"/>
  <line x1="200" y1="130" x2="240" y2="130" stroke="#DDD" stroke-width="1"/>
  <line x1="200" y1="140" x2="240" y2="140" stroke="#DDD" stroke-width="1"/>
  <line x1="200" y1="150" x2="240" y2="150" stroke="#DDD" stroke-width="1"/>
  <text x="220" y="185" font-family="Fredoka" font-size="12" text-anchor="middle" fill="#444">Book</text>
</svg>