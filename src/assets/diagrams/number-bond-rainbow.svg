<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Rainbow arcs for number bonds -->
  <!-- 0 + 10 = 10 -->
  <path d="M 20 150 Q 150 50 280 150" fill="none" stroke="#FF6B6B" stroke-width="3"/>
  <text x="150" y="40" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#FF6B6B">0 + 10</text>
  
  <!-- 1 + 9 = 10 -->
  <path d="M 40 140 Q 150 60 260 140" fill="none" stroke="#4ECDC4" stroke-width="3"/>
  <text x="150" y="55" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#4ECDC4">1 + 9</text>
  
  <!-- 2 + 8 = 10 -->
  <path d="M 60 130 Q 150 70 240 130" fill="none" stroke="#FFD166" stroke-width="3"/>
  <text x="150" y="70" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#FFD166">2 + 8</text>
  
  <!-- 3 + 7 = 10 -->
  <path d="M 80 120 Q 150 80 220 120" fill="none" stroke="#118AB2" stroke-width="3"/>
  <text x="150" y="85" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#118AB2">3 + 7</text>
  
  <!-- 4 + 6 = 10 -->
  <path d="M 100 110 Q 150 90 200 110" fill="none" stroke="#06D6A0" stroke-width="3"/>
  <text x="150" y="100" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#06D6A0">4 + 6</text>
  
  <!-- 5 + 5 = 10 -->
  <line x1="150" y1="100" x2="150" y2="150" stroke="#EF476F" stroke-width="3"/>
  <text x="150" y="115" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#EF476F">5 + 5</text>
  
  <!-- Number line at the bottom -->
  <line x1="20" y1="150" x2="280" y2="150" stroke="#444" stroke-width="2"/>
  <text x="20" y="170" font-family="Fredoka" font-size="16" text-anchor="middle">0</text>
  <text x="280" y="170" font-family="Fredoka" font-size="16" text-anchor="middle">10</text>
</svg>