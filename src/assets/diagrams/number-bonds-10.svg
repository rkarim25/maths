<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Number line -->
  <line x1="20" y1="100" x2="280" y2="100" stroke="#444" stroke-width="2"/>
  
  <!-- Numbers on the line -->
  <text x="20" y="90" font-family="Fredoka" font-size="16" text-anchor="middle">0</text>
  <text x="280" y="90" font-family="Fredoka" font-size="16" text-anchor="middle">10</text>
  
  <!-- Arrows showing number bonds -->
  <line x1="20" y1="100" x2="280" y2="100" stroke="#FF6B6B" stroke-width="3"/>
  <polygon points="280,95 290,100 280,105" fill="#FF6B6B"/>
  
  <!-- Labels for number bonds -->
  <text x="150" y="80" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FF6B6B">0 + 10 = 10</text>
  
  <!-- Second example -->
  <line x1="50" y1="130" x2="250" y2="130" stroke="#4ECDC4" stroke-width="3"/>
  <polygon points="250,125 260,130 250,135" fill="#4ECDC4"/>
  
  <text x="150" y="120" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#4ECDC4">3 + 7 = 10</text>
  
  <!-- Third example -->
  <line x1="80" y1="160" x2="220" y2="160" stroke="#FFD166" stroke-width="3"/>
  <polygon points="220,155 230,160 220,165" fill="#FFD166"/>
  
  <text x="150" y="150" font-family="Fredoka" font-size="16" text-anchor="middle" fill="#FFD166">5 + 5 = 10</text>
</svg>