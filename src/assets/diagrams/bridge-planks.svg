<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Bridge structure -->
  <rect x="0" y="100" width="300" height="20" fill="#8B4513"/>
  
  <!-- Planks -->
  <!-- Left side planks (5 planks) -->
  <rect x="30" y="80" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="30" y="65" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="30" y="50" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="30" y="35" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="30" y="20" width="40" height="10" fill="#A0522D" rx="5"/>
  
  <!-- Right side planks (3 planks) -->
  <rect x="100" y="80" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="100" y="65" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="100" y="50" width="40" height="10" fill="#A0522D" rx="5"/>
  
  <!-- Labels -->
  <text x="50" y="15" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">5 planks</text>
  <text x="120" y="15" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">3 planks</text>
  
  <!-- Question mark -->
  <text x="200" y="50" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">?</text>
  
  <!-- Equals sign -->
  <text x="200" y="80" font-family="Fredoka" font-size="24" text-anchor="middle" fill="#444">=</text>
  
  <!-- Total planks (8 planks) -->
  <rect x="230" y="80" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="65" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="50" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="35" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="20" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="95" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="110" width="40" height="10" fill="#A0522D" rx="5"/>
  <rect x="230" y="125" width="40" height="10" fill="#A0522D" rx="5"/>
  
  <text x="250" y="15" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">8 planks</text>
</svg>