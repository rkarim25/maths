<svg width="300" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f0f8ff"/>
  
  <!-- Circle -->
  <circle cx="70" cy="70" r="30" fill="#FF6B6B"/>
  <text x="70" y="110" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">Circle</text>
  
  <!-- Square -->
  <rect x="140" y="40" width="60" height="60" fill="#4ECDC4"/>
  <text x="170" y="110" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">Square</text>
  
  <!-- Triangle -->
  <polygon points="250,40 280,100 220,100" fill="#FFD166"/>
  <text x="250" y="120" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">Triangle</text>
  
  <!-- Rectangle -->
  <rect x="100" y="140" width="100" height="50" fill="#118AB2"/>
  <text x="150" y="195" font-family="Fredoka" font-size="14" text-anchor="middle" fill="#444">Rectangle</text>
</svg>